# =============================================================
# inputs.conf — Splunk Universal Forwarder Configuration
# SOC Incident Response Lab — IR-2026-001
# =============================================================
# Purpose: Configure the Splunk Universal Forwarder on Windows
#          endpoints to forward relevant security event logs to
#          the Splunk indexer for analysis.
#
# Deployment path: $SPLUNK_HOME/etc/system/local/inputs.conf
# Restart required: Yes (restart Splunk UF after changes)
# =============================================================

# -------------------------------------------------------
# Windows Security Event Log
# Critical for: DET-001, DET-002, DET-003, DET-004, DET-005
# Key Event IDs:
#   4624 — Successful logon
#   4625 — Failed logon
#   4688 — Process creation (requires Audit Process Tracking)
#   4689 — Process termination
# -------------------------------------------------------
[WinEventLog://Security]
disabled = false
index = windows
sourcetype = WinEventLog:Security
start_from = oldest
current_only = 0
checkpointInterval = 5
renderXml = false
evt_resolve_ad_obj = 1

# Whitelist only relevant Event IDs to reduce noise
# Remove the whitelist line to capture all Security events
whitelist = 4624,4625,4634,4647,4648,4656,4663,4672,4688,4689,4698,4720,4732,4756

# -------------------------------------------------------
# Windows System Event Log
# Useful for: Service changes, reboots, driver events
# Key Event IDs:
#   7045 — New service installed
#   7036 — Service state change
# -------------------------------------------------------
[WinEventLog://System]
disabled = false
index = windows
sourcetype = WinEventLog:System
start_from = oldest
current_only = 0
checkpointInterval = 5
renderXml = false

whitelist = 7036,7045,7040

# -------------------------------------------------------
# Windows Application Event Log
# Useful for: Application crashes, AV events
# -------------------------------------------------------
[WinEventLog://Application]
disabled = false
index = windows
sourcetype = WinEventLog:Application
start_from = oldest
current_only = 0
checkpointInterval = 5
renderXml = false

# -------------------------------------------------------
# PowerShell Operational Log
# Critical for: DET-003, DET-004
# Key Event IDs:
#   4103 — Module logging
#   4104 — Script block logging (captures full script content)
#   4105 — ScriptBlock invocation start
#   4106 — ScriptBlock invocation end
#
# PREREQUISITE: Enable PowerShell Script Block Logging via GPO:
#   Computer Config > Admin Templates > Windows Components >
#   Windows PowerShell > Turn on PowerShell Script Block Logging
# -------------------------------------------------------
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = false
index = windows
sourcetype = WinEventLog:Microsoft-Windows-PowerShell/Operational
start_from = oldest
current_only = 0
checkpointInterval = 5
renderXml = false

whitelist = 4103,4104,4105,4106

# -------------------------------------------------------
# Sysmon Operational Log
# Critical for: DET-003, DET-004, DET-005
# Sysmon Event IDs used:
#   1  — Process creation
#   3  — Network connection
#   7  — Image loaded
#   10 — Process access
#   11 — File created
#   12 — Registry event
#   13 — Registry value set
#   22 — DNS query
#
# PREREQUISITE: Sysmon must be installed and running on the endpoint.
#   Download: https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon
#   Install:  sysmon64.exe -accepteula -i sysmonconfig.xml
# -------------------------------------------------------
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = windows
sourcetype = XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
renderXml = true
start_from = oldest
current_only = 0
checkpointInterval = 5

# -------------------------------------------------------
# Windows Defender Operational Log
# Useful for: Malware detection events
# Key Event IDs:
#   1116 — Malware detected
#   1117 — Action taken on malware
# -------------------------------------------------------
[WinEventLog://Microsoft-Windows-Windows Defender/Operational]
disabled = false
index = windows
sourcetype = WinEventLog:Microsoft-Windows-Windows-Defender/Operational
start_from = oldest
current_only = 0
renderXml = false

whitelist = 1116,1117,1118,1119

# =============================================================
# Notes:
# - Ensure the index "windows" exists in your Splunk indexer
# - Adjust whitelist values based on your threat detection needs
# - Enable Audit Process Creation in Local Security Policy to
#   capture Event ID 4688 with CommandLine data
# - Set "Include command line in process creation events" via GPO
#   for full CommandLine visibility in Event ID 4688
# =============================================================
